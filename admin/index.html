<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brajesh Admin</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #11100f;
      --panel: #211d1a;
      --panel-soft: #2a2420;
      --ink: #f5efe7;
      --muted: #b7aa9c;
      --faint: #82776d;
      --line: #3d352f;
      --line-strong: #594d44;
      --red: #bd6570;
      --red-soft: rgba(189, 101, 112, 0.16);
      --teal: #86c7c3;
      --gold: #d6b56f;
      --serif: Georgia, "Times New Roman", serif;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(90deg, rgba(134, 199, 195, 0.06), transparent 22%, transparent 78%, rgba(189, 101, 112, 0.06)),
        linear-gradient(180deg, #191514 0%, #11100f 48%, #0c0b0a 100%);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    textarea:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    [hidden] {
      display: none !important;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 72px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 38px;
    }

    .brand {
      color: var(--ink);
      text-decoration: none;
    }

    .brand strong {
      display: block;
      font-family: var(--serif);
      font-size: clamp(2.2rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 0.9;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(33, 29, 26, 0.82);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.28);
      padding: clamp(18px, 3vw, 28px);
    }

    .panel + .panel {
      margin-top: 22px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
    }

    h2 {
      font-size: 2rem;
    }

    h3 {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      margin: 0 0 16px;
    }

    .status[data-tone="error"] {
      color: #ffb8bf;
    }

    .status[data-tone="ok"] {
      color: var(--teal);
    }

    .helper-text {
      margin: 0;
      color: var(--faint);
      font-size: 0.9rem;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, 0.35fr);
      gap: 10px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(9, 8, 8, 0.46);
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 154px;
      resize: vertical;
      font-family: var(--serif);
      font-size: 1.1rem;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(134, 199, 195, 0.12);
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--teal);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      justify-content: space-between;
    }

    .management-actions {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      justify-content: flex-end;
    }

    .save-status {
      min-height: 20px;
      color: var(--faint);
      font-size: 0.82rem;
    }

    .save-status[data-tone="warn"] {
      color: var(--gold);
    }

    .save-status[data-tone="ok"] {
      color: var(--teal);
    }

    .save-status[data-tone="error"] {
      color: #ffb8bf;
    }

    .primary-button,
    .ghost-button,
    .danger-button {
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 0 13px;
      font-weight: 700;
    }

    .primary-button {
      background: var(--teal);
      color: #0c1515;
    }

    .ghost-button {
      border-color: var(--line);
      background: rgba(245, 239, 231, 0.04);
      color: var(--muted);
    }

    .danger-button {
      border-color: rgba(189, 101, 112, 0.42);
      background: rgba(189, 101, 112, 0.1);
      color: #ffd5d9;
    }

    .save-button:disabled {
      cursor: not-allowed;
      opacity: 1;
      border-color: var(--line);
      background: rgba(245, 239, 231, 0.04);
      color: var(--faint);
    }

    .save-button[data-state="saving"],
    .save-button[data-state="saved"] {
      opacity: 1;
      border-color: transparent;
    }

    .save-button[data-state="saving"] {
      cursor: wait;
      background: var(--teal);
      color: #0c1515;
    }

    .save-button[data-state="saved"] {
      cursor: default;
      background: rgba(134, 199, 195, 0.16);
      color: var(--teal);
      border-color: rgba(134, 199, 195, 0.28);
    }

    .poem-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
      margin-top: 22px;
    }

    .poem {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(42, 36, 32, 0.9), rgba(27, 23, 21, 0.92));
      overflow: hidden;
    }

    .poem.poem-flash {
      animation: poem-flash 1.6s ease;
    }

    .poem-body {
      display: grid;
      gap: 16px;
      padding: clamp(20px, 3vw, 28px);
    }

    .poem-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--faint);
      font-size: 0.84rem;
    }

    .tag {
      border: 1px solid rgba(214, 181, 111, 0.35);
      border-radius: 999px;
      color: var(--gold);
      padding: 2px 7px;
    }

    .comment-list {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      background: rgba(11, 10, 10, 0.22);
      padding: 18px clamp(20px, 3vw, 28px) 22px;
    }

    .comment {
      display: grid;
      gap: 5px;
      border-left: 3px solid var(--teal);
      padding-left: 12px;
    }

    .comment-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .comment p {
      margin: 0;
      color: var(--muted);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 26px;
      text-align: center;
    }

    @keyframes poem-flash {
      0% {
        box-shadow: 0 0 0 0 rgba(134, 199, 195, 0.46);
      }

      40% {
        box-shadow: 0 0 0 4px rgba(134, 199, 195, 0.32);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(134, 199, 195, 0);
      }
    }

    @media (max-width: 720px) {
      .topbar,
      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .poem-list {
        grid-template-columns: 1fr;
      }

      .primary-button,
      .ghost-button,
      .danger-button {
        width: 100%;
      }

      .management-actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="/">
        <strong>Brajesh</strong>
        <span>Admin</span>
      </a>
      <div class="button-row">
        <a class="ghost-button" href="/affirmations/">Affirmations</a>
        <a class="ghost-button" href="/">View Site</a>
      </div>
    </header>

    <p class="status" id="status" role="status"></p>

    <section class="panel" id="loginPanel">
      <div class="panel-head">
        <div>
          <h1>Magic Link Login</h1>
          <p class="helper-text" id="sessionHint">Use your approved admin email. A sign-in link will be emailed to you.</p>
        </div>
      </div>
      <form class="form-grid" id="loginForm">
        <label>
          Email
          <input name="email" type="email" autocomplete="email" inputmode="email" required>
        </label>
        <div class="button-row">
          <button class="ghost-button" id="loginLogoutButton" type="button" hidden>Use Different Email</button>
          <button class="primary-button" type="submit">Send Magic Link</button>
        </div>
      </form>
    </section>

    <section id="adminPanel" hidden>
      <section class="panel">
        <div class="panel-head">
          <div>
            <h1>Manage Poems</h1>
            <p class="helper-text" id="adminIdentity"></p>
          </div>
          <button class="ghost-button" id="logoutButton" type="button">Sign Out</button>
        </div>
        <form class="form-grid" id="newPoemForm">
          <div class="form-row">
            <label>
              Title
              <input name="title" autocomplete="off" required>
            </label>
            <label>
              Slug
              <input name="slug" autocomplete="off" placeholder="auto">
            </label>
          </div>
          <label>
            Poem
            <textarea name="body" required></textarea>
          </label>
          <div class="button-row">
            <label class="checkbox-row">
              <input name="published" type="checkbox" checked>
              Published
            </label>
            <button class="primary-button" type="submit">Add Poem</button>
          </div>
        </form>
      </section>

      <section class="poem-list" id="poemList" aria-live="polite"></section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import {
      createBrajeshClient,
      sendBrajeshMagicLink,
      requireBrajeshAdmin,
      signOutBrajesh,
    } from "../assets/js/brajesh-auth.js";

    const state = {
      user: null,
      poems: [],
      stats: new Map(),
      comments: new Map(),
    };

    const elements = {
      status: document.querySelector("#status"),
      loginPanel: document.querySelector("#loginPanel"),
      adminPanel: document.querySelector("#adminPanel"),
      loginForm: document.querySelector("#loginForm"),
      loginLogoutButton: document.querySelector("#loginLogoutButton"),
      logoutButton: document.querySelector("#logoutButton"),
      sessionHint: document.querySelector("#sessionHint"),
      adminIdentity: document.querySelector("#adminIdentity"),
      newPoemForm: document.querySelector("#newPoemForm"),
      poemList: document.querySelector("#poemList"),
    };

    const db = createBrajeshClient();

    function setStatus(text, tone = "") {
      elements.status.textContent = text;
      elements.status.dataset.tone = tone;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function slugify(value) {
      const slug = String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");

      return slug || `poem-${Date.now()}`;
    }

    function showLogin() {
      elements.loginPanel.hidden = false;
      elements.adminPanel.hidden = true;
    }

    function showAdmin() {
      elements.loginPanel.hidden = true;
      elements.adminPanel.hidden = false;
    }

    function updateIdentityUI() {
      if (state.user?.email) {
        elements.sessionHint.textContent = `Signed in as ${state.user.email}. Use a different email if needed.`;
        elements.loginLogoutButton.hidden = false;
        elements.adminIdentity.textContent = `Signed in as ${state.user.email}`;
        return;
      }

      elements.sessionHint.textContent = "Use your approved admin email. A sign-in link will be emailed to you.";
      elements.loginLogoutButton.hidden = true;
      elements.adminIdentity.textContent = "";
    }

    function setLoginBusy(isBusy) {
      const submitButton = elements.loginForm.querySelector("button[type='submit']");
      elements.loginForm.elements.email.disabled = isBusy;
      elements.loginLogoutButton.disabled = isBusy;
      submitButton.disabled = isBusy;
      submitButton.textContent = isBusy ? "Sending Link..." : "Send Magic Link";
    }

    function getStats(poemId) {
      return state.stats.get(poemId) || { likes_count: 0, comments_count: 0 };
    }

    function getPoem(poemId) {
      return state.poems.find((poem) => poem.id === poemId) || null;
    }

    function getComments(poemId) {
      return state.comments.get(poemId) || [];
    }

    function setButtonBusy(button, isBusy, busyText) {
      if (!button.dataset.idleText) {
        button.dataset.idleText = button.textContent;
      }
      button.disabled = isBusy;
      button.textContent = isBusy ? busyText : button.dataset.idleText;
    }

    function highlightPoem(poemId) {
      if (!poemId) return;

      const poemElement = elements.poemList.querySelector(`[data-poem-id="${poemId}"]`);
      if (!poemElement) return;

      poemElement.scrollIntoView({ behavior: "smooth", block: "center" });
      poemElement.classList.remove("poem-flash");
      void poemElement.offsetWidth;
      poemElement.classList.add("poem-flash");
      window.setTimeout(() => {
        poemElement.classList.remove("poem-flash");
      }, 1600);
    }

    function getPoemFormElements(form) {
      return {
        saveButton: form.querySelector(".save-button"),
        saveStatus: form.querySelector(".save-status"),
      };
    }

    function setPoemFormStatus(form, text = "", tone = "") {
      const { saveStatus } = getPoemFormElements(form);
      saveStatus.textContent = text;
      saveStatus.dataset.tone = tone;
    }

    function setPoemSaveButtonState(form, stateName = "") {
      const { saveButton } = getPoemFormElements(form);
      saveButton.dataset.state = stateName;
    }

    function getPoemDraft(form) {
      const data = new FormData(form);
      return {
        title: String(data.get("title") || "").trim(),
        slug: String(data.get("slug") || "").trim(),
        body: String(data.get("body") || "").trim(),
        published: data.get("published") === "on",
      };
    }

    function isPoemFormDirty(form) {
      const poemId = form.closest("[data-poem-id]")?.dataset.poemId;
      const poem = getPoem(poemId);
      if (!poem) return false;

      const draft = getPoemDraft(form);
      return draft.title !== String(poem.title || "").trim()
        || draft.slug !== String(poem.slug || "").trim()
        || draft.body !== String(poem.body || "").trim()
        || draft.published !== Boolean(poem.published);
    }

    function syncPoemFormDirtyState(form) {
      const { saveButton } = getPoemFormElements(form);
      if (saveButton.dataset.state === "saving") return;

      const dirty = isPoemFormDirty(form);
      setPoemSaveButtonState(form, dirty ? "dirty" : "");
      saveButton.disabled = !dirty;
      saveButton.textContent = "Save";
      setPoemFormStatus(form, dirty ? "Unsaved changes" : "", dirty ? "warn" : "");
    }

    function markPoemSaved(poemId) {
      const form = elements.poemList.querySelector(`[data-poem-id="${poemId}"] [data-action="save-poem"]`);
      if (!form) return;

      const { saveButton } = getPoemFormElements(form);
      setPoemSaveButtonState(form, "saved");
      saveButton.disabled = true;
      saveButton.textContent = "Saved";
      setPoemFormStatus(form, "Saved", "ok");

      window.setTimeout(() => {
        if (!document.body.contains(form)) return;
        syncPoemFormDirtyState(form);
      }, 1400);
    }

    function getNextDisplayOrder() {
      return state.poems.reduce((maxOrder, poem) => Math.max(maxOrder, Number(poem.display_order) || 0), 0) + 10;
    }

    function buildPoemPayload(data, displayOrder = null) {
      const title = String(data.get("title") || "").trim();
      const slug = slugify(String(data.get("slug") || "").trim() || title);
      const body = String(data.get("body") || "").trim();
      const published = data.get("published") === "on";

      const payload = {
        title,
        slug,
        body,
        published,
      };

      if (displayOrder !== null) {
        payload.display_order = displayOrder;
      }

      return payload;
    }

    function resetStateCollections() {
      state.poems = [];
      state.stats = new Map();
      state.comments = new Map();
    }

    async function loadAdminData(options = {}) {
      try {
        if (!options.silent) {
          setStatus("Checking access.");
        }

        const { user, isAdmin } = await requireBrajeshAdmin(db);
        state.user = user;
        updateIdentityUI();

        if (!user) {
          resetStateCollections();
          showLogin();
          if (!options.silent) {
            setStatus("Enter your email to receive a magic link.");
          }
          return;
        }

        if (!isAdmin) {
          resetStateCollections();
          showLogin();
          setStatus(`${user.email} is signed in, but this email does not have Brajesh admin access.`, "error");
          return;
        }

        if (!options.silent) {
          setStatus("Loading.");
        }

        const [poemsResult, statsResult, commentsResult] = await Promise.all([
          db.from("brajesh_poems")
            .select("id, slug, title, body, display_order, published, created_at, updated_at")
            .order("display_order", { ascending: true }),
          db.from("brajesh_poem_stats")
            .select("poem_id, likes_count, comments_count"),
          db.from("brajesh_comments")
            .select("id, poem_id, author_name, body, approved, created_at, updated_at")
            .order("created_at", { ascending: true }),
        ]);

        const error = poemsResult.error || statsResult.error || commentsResult.error;
        if (error) {
          throw error;
        }

        state.poems = poemsResult.data || [];
        state.stats = new Map((statsResult.data || []).map((row) => [row.poem_id, row]));
        state.comments = new Map();

        for (const comment of commentsResult.data || []) {
          if (!state.comments.has(comment.poem_id)) {
            state.comments.set(comment.poem_id, []);
          }
          state.comments.get(comment.poem_id).push(comment);
        }

        showAdmin();
        render();
        setStatus("");
      } catch (error) {
        showLogin();
        setStatus(error.message || "Could not load admin data.", "error");
      }
    }

    function render() {
      elements.poemList.innerHTML = state.poems.length
        ? state.poems.map((poem, index) => renderPoem(poem, index)).join("")
        : '<div class="empty">No poems yet.</div>';
    }

    function renderPoem(poem, index) {
      const comments = getComments(poem.id);
      const stats = getStats(poem.id);
      const isFirst = index === 0;
      const isLast = index === state.poems.length - 1;

      return `
        <article class="poem" data-poem-id="${poem.id}">
          <form class="poem-body form-grid" data-action="save-poem">
            <div class="poem-meta">
              <span>${stats.likes_count} likes</span>
              <span>${stats.comments_count} comments</span>
              ${poem.published ? "" : '<span class="tag">Hidden</span>'}
            </div>
            <h3>${escapeHtml(poem.title)}</h3>
            <div class="form-row">
              <label>
                Title
                <input name="title" value="${escapeHtml(poem.title)}" required>
              </label>
              <label>
                Slug
                <input name="slug" value="${escapeHtml(poem.slug)}" required>
              </label>
            </div>
            <label>
              Poem
              <textarea name="body" required>${escapeHtml(poem.body)}</textarea>
            </label>
            <div class="button-row">
              <label class="checkbox-row">
                <input name="published" type="checkbox" ${poem.published ? "checked" : ""}>
                Published
              </label>
              <span class="management-actions">
                <span class="save-status" aria-live="polite"></span>
                <button class="ghost-button" type="button" data-action="move-up" ${isFirst ? "disabled" : ""}>Move Up</button>
                <button class="ghost-button" type="button" data-action="move-down" ${isLast ? "disabled" : ""}>Move Down</button>
                <button class="primary-button save-button" type="submit" disabled>Save</button>
                <button class="danger-button" type="button" data-action="delete-poem">Delete</button>
              </span>
            </div>
          </form>
          <section class="comment-list">
            ${comments.length ? comments.map(renderComment).join("") : '<div class="empty">No comments.</div>'}
          </section>
        </article>
      `;
    }

    function renderComment(comment) {
      return `
        <div class="comment" data-comment-id="${comment.id}">
          <div class="comment-head">
            <strong>${escapeHtml(comment.author_name)}</strong>
            <button class="danger-button" type="button" data-action="delete-comment">Delete</button>
          </div>
          <p>${escapeHtml(comment.body)}</p>
        </div>
      `;
    }

    function clearAuthHash() {
      if (!window.location.hash) return;

      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);

      if (params.has("access_token") || params.has("refresh_token") || params.has("error_description")) {
        window.history.replaceState({}, document.title, `${window.location.pathname}${window.location.search}`);
      }
    }

    async function handleSignOut(successMessage = "Signed out.") {
      let signOutFailed = false;

      try {
        await signOutBrajesh(db);
      } catch (error) {
        signOutFailed = true;
        setStatus(error.message || "Could not sign out.", "error");
      }

      if (signOutFailed) {
        return;
      }

      state.user = null;
      resetStateCollections();
      updateIdentityUI();
      showLogin();
      setStatus(successMessage, "ok");
    }

    async function movePoem(poemId, moveDirection) {
      const currentIndex = state.poems.findIndex((poem) => poem.id === poemId);
      if (currentIndex === -1) return false;

      const targetIndex = moveDirection === "up" ? currentIndex - 1 : currentIndex + 1;
      if (targetIndex < 0 || targetIndex >= state.poems.length) {
        return false;
      }

      const currentPoem = state.poems[currentIndex];
      const targetPoem = state.poems[targetIndex];
      const currentOrder = Number(currentPoem.display_order) || 0;
      const targetOrder = Number(targetPoem.display_order) || 0;

      const { error: firstError } = await db
        .from("brajesh_poems")
        .update({ display_order: targetOrder })
        .eq("id", currentPoem.id);

      if (firstError) {
        throw firstError;
      }

      const { error: secondError } = await db
        .from("brajesh_poems")
        .update({ display_order: currentOrder })
        .eq("id", targetPoem.id);

      if (secondError) {
        await db.from("brajesh_poems").update({ display_order: currentOrder }).eq("id", currentPoem.id);
        throw secondError;
      }

      return true;
    }

    elements.loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const email = String(new FormData(form).get("email") || "");

      setLoginBusy(true);
      setStatus("Sending magic link.");

      try {
        const normalizedEmail = await sendBrajeshMagicLink(db, email, "/admin/");
        form.reset();
        setStatus(`Check ${normalizedEmail} for your sign-in link.`, "ok");
      } catch (error) {
        setStatus(error.message || "Could not send magic link.", "error");
      } finally {
        setLoginBusy(false);
      }
    });

    elements.loginLogoutButton.addEventListener("click", async () => {
      await handleSignOut("Signed out. You can request a new magic link with a different email.");
    });

    elements.logoutButton.addEventListener("click", async () => {
      await handleSignOut();
    });

    elements.newPoemForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const submitButton = form.querySelector("button[type='submit']");
      const data = new FormData(form);

      setButtonBusy(submitButton, true, "Adding...");
      setStatus("Adding poem.");

      try {
        const payload = buildPoemPayload(data, getNextDisplayOrder());
        const { data: insertedPoem, error } = await db
          .from("brajesh_poems")
          .insert(payload)
          .select("id")
          .single();

        if (error) {
          throw error;
        }

        form.reset();
        form.elements.published.checked = true;
        await loadAdminData({ silent: true });
        highlightPoem(insertedPoem?.id);
        setStatus("Poem added.", "ok");
      } catch (error) {
        setStatus(error.message || "Could not add poem.", "error");
      } finally {
        setButtonBusy(submitButton, false, "Adding...");
      }
    });

    elements.poemList.addEventListener("input", (event) => {
      const form = event.target.closest("[data-action='save-poem']");
      if (!form) return;
      syncPoemFormDirtyState(form);
    });

    elements.poemList.addEventListener("change", (event) => {
      const form = event.target.closest("[data-action='save-poem']");
      if (!form) return;
      syncPoemFormDirtyState(form);
    });

    elements.poemList.addEventListener("submit", async (event) => {
      if (!event.target.matches("[data-action='save-poem']")) return;
      event.preventDefault();

      const form = event.target;
      const poemId = form.closest("[data-poem-id]")?.dataset.poemId;
      const { saveButton } = getPoemFormElements(form);
      const data = new FormData(form);

      if (!isPoemFormDirty(form)) return;

      setPoemSaveButtonState(form, "saving");
      saveButton.disabled = true;
      saveButton.textContent = "Saving...";
      setPoemFormStatus(form, "");

      try {
        const payload = buildPoemPayload(data);
        const { error } = await db
          .from("brajesh_poems")
          .update(payload)
          .eq("id", poemId);

        if (error) {
          throw error;
        }

        await loadAdminData({ silent: true });
        markPoemSaved(poemId);
        setStatus("Poem saved.", "ok");
      } catch (error) {
        setPoemSaveButtonState(form, "dirty");
        saveButton.disabled = false;
        saveButton.textContent = "Save";
        setPoemFormStatus(form, error.message || "Could not save.", "error");
        setStatus(error.message || "Could not save.", "error");
      }
    });

    elements.poemList.addEventListener("click", async (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;

      const action = target.dataset.action;

      if (action === "move-up" || action === "move-down") {
        const poemId = target.closest("[data-poem-id]")?.dataset.poemId;
        const moveDirection = action === "move-up" ? "up" : "down";

        try {
          const moved = await movePoem(poemId, moveDirection);
          await loadAdminData({ silent: true });
          setStatus(moved ? "Poem moved." : "Poem is already at the edge.", moved ? "ok" : "");
        } catch (error) {
          setStatus(error.message || "Could not move poem.", "error");
        }
      }

      if (action === "delete-poem") {
        const poemElement = target.closest("[data-poem-id]");
        const poemId = poemElement?.dataset.poemId;
        const title = poemElement?.querySelector("h3")?.textContent || "this poem";
        if (!window.confirm(`Delete "${title}"?`)) return;

        try {
          const { error } = await db.from("brajesh_poems").delete().eq("id", poemId);
          if (error) {
            throw error;
          }

          await loadAdminData({ silent: true });
          setStatus("Poem deleted.", "ok");
        } catch (error) {
          setStatus(error.message || "Could not delete poem.", "error");
        }
      }

      if (action === "delete-comment") {
        const commentId = target.closest("[data-comment-id]")?.dataset.commentId;
        if (!commentId || !window.confirm("Delete this comment?")) return;

        try {
          const { error } = await db.from("brajesh_comments").delete().eq("id", commentId);
          if (error) {
            throw error;
          }

          await loadAdminData({ silent: true });
          setStatus("Comment deleted.", "ok");
        } catch (error) {
          setStatus(error.message || "Could not delete comment.", "error");
        }
      }
    });

    db.auth.onAuthStateChange(() => {
      clearAuthHash();
      loadAdminData({ silent: true });
    });

    updateIdentityUI();
    loadAdminData().finally(() => {
      clearAuthHash();
    });
  </script>
</body>
</html>
